services:
  - type: web
    name: futbol-stats-pro-api
    env: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-stats-db
          property: connectionString
      - key: PORT
        value: "3000"

databases:
  - name: futbol-stats-db
    plan: free
    region: ohio
    databaseName: futbol_db
    user: postgres
