services:
  backend:
    build: .
    container_name: futbol-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password123@db_futbol:5432/futbol_db 
    depends_on:
      - db_futbol

  db_futbol:
    image: postgres:15-alpine
    container_name: futbol-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: futbol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: